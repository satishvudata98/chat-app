name: OTA Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      message:
        description: Update message
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish production OTA update
        run: |
          MESSAGE="${{ github.event.inputs.message || github.event.head_commit.message || '' }}"
          if [ -n "$MESSAGE" ]; then
            eas update --channel production --message "$MESSAGE" --non-interactive
          else
            eas update --channel production --message "OTA update ${GITHUB_SHA}" --non-interactive
          fi